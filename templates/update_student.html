{% extends 'base.html' %}

{% block title %}
Update Student
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">
            <h3>Update Student</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text"
                           name="name"
                           class="form-control"
                           value="{{ student.name }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Age</label>
                    <input type="number"
                           name="age"
                           class="form-control"
                           value="{{ student.age }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Gender</label>

                    <select name="gender" class="form-select">

                        <option value="Male"
                        {% if student.gender == "Male" %}selected{% endif %}>
                        Male
                        </option>

                        <option value="Female"
                        {% if student.gender == "Female" %}selected{% endif %}>
                        Female
                        </option>

                        <option value="Other"
                        {% if student.gender == "Other" %}selected{% endif %}>
                        Other
                        </option>

                    </select>

                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           value="{{ student.email }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Phone</label>
                    <input type="text"
                           name="phone"
                           class="form-control"
                           value="{{ student.phone }}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Address</label>
                    <textarea name="address"
                              class="form-control"
                              rows="3">{{ student.address }}</textarea>
                </div>

                <div class="mb-3">
                    <label>Department</label>

                    <select name="department" class="form-select">

                        {% for department in departments %}

                        <option value="{{ department.id }}"
                        {% if student.department.id == department.id %}selected{% endif %}>

                            {{ department.department_name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">
                    <label>Course</label>

                    <select name="course" class="form-select">

                        {% for course in courses %}

                        <option value="{{ course.id }}"
                        {% if student.course.id == course.id %}selected{% endif %}>

                            {{ course.course_name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <button type="submit" class="btn btn-success">
                    Update Student
                </button>

                <a href="{% url 'student_list' %}" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
